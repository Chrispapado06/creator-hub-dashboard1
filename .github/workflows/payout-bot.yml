name: OF payout bot

on:
  schedule:
    - cron: "*/10 * * * *"     # every 10 minutes
  workflow_dispatch:           # manual "Run" button in the Actions tab

permissions:
  contents: write              # so the action can commit state.json back

concurrency:
  group: of-payout-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run watcher
        env:
          ONLYFANSAPI_KEY: ${{ secrets.ONLYFANSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node payout-bot/bot.mjs

      - name: Commit state if changed
        run: |
          git config user.name  'payout-bot'
          git config user.email 'payout-bot@users.noreply.github.com'
          git add payout-bot/state.json
          git diff --cached --quiet || (git commit -m "bot: update state.json [skip ci]" && git push)
