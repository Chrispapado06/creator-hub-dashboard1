name: OF payout bot (every 10 min)

on:
  schedule:
    - cron: "*/10 * * * *"   # real-time payout-request alerts
  workflow_dispatch:

permissions:
  contents: write   # commits state.json back to the repo

concurrency:
  group: of-payout-bot
  cancel-in-progress: false

jobs:
  payouts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Poll payout requests
        env:
          ONLYFANSAPI_KEY: ${{ secrets.ONLYFANSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node payout-bot/bot.mjs
      - name: Commit state if changed
        run: |
          git config user.name  'payout-bot'
          git config user.email 'payout-bot@users.noreply.github.com'
          git add payout-bot/state.json
          git diff --cached --quiet || (git commit -m "bot: update state.json [skip ci]" && git push)
