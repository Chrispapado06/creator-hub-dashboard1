name: Telegram /update command bot

# Polls Telegram every 2 minutes for new /update commands in the
# UNCVRD Daily Stats group and replies with today-so-far OF stats.
# Every-other-minute schedule (odd minutes) so it doesn't routinely
# collide with the other 10-min OF / 15-min Reddit crons.
# Cron disabled — /update and /24 are now handled in real-time by
# the supabase/functions/telegram-webhook edge function (deployed to
# Supabase project nyolewfgobbfroweaxtr). Telegram pushes new
# messages directly to the function instead of being polled. Kept
# workflow_dispatch around as a manual fallback in case the webhook
# is ever disabled and we need to drain the queue via getUpdates.
on:
  workflow_dispatch:

permissions:
  contents: write   # commits telegram-bot-state.json back to the repo

concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: payout-bot/package-lock.json
      - name: Install bot deps (pdf-lib)
        run: npm ci --prefix payout-bot
      - name: Poll for /update commands
        env:
          ONLYFANSAPI_KEY: ${{ secrets.ONLYFANSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_DAILY: ${{ secrets.TELEGRAM_CHAT_ID_DAILY }}
        run: node payout-bot/telegram-bot.mjs
      - name: Commit state if changed
        run: |
          git config user.name  'telegram-bot'
          git config user.email 'telegram-bot@users.noreply.github.com'
          git add payout-bot/telegram-bot-state.json
          git diff --cached --quiet || (git commit -m "bot: telegram-bot-state [skip ci]" && git push)
